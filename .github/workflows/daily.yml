name: daily-fintwit
on:
  schedule:
    - cron: '30 1 * * *'  # 01:30 UTC = 09:30 Asia/Shanghai
    - cron: '45 1 * * *'  # backup: 09:45 Asia/Shanghai
    - cron: '0 2 * * *'   # backup: 10:00 Asia/Shanghai
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - name: Check existing daily report
        id: existing_report
        run: |
          stamp=$(date -u +%Y%m%d)
          report="public/reports/daily_${stamp}.html"
          echo "report=$report" >> "$GITHUB_OUTPUT"
          if [ -f "$report" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Report already exists: $report"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Report does not exist yet: $report"
          fi
      - name: Restore runtime cache
        if: steps.existing_report.outputs.skip != 'true'
        uses: actions/cache/restore@v4
        with:
          path: data/cache
          key: runtime-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            runtime-cache-${{ runner.os }}-
      - name: Run pipeline
        if: steps.existing_report.outputs.skip != 'true'
        env:
          TWEX_API_KEY: ${{ secrets.TWEX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          LLM_CLASSIFIER_ENABLED: ${{ vars.LLM_CLASSIFIER_ENABLED || 'true' }}
          LLM_CLASSIFIER_BATCH_SIZE: ${{ vars.LLM_CLASSIFIER_BATCH_SIZE || '20' }}
          LLM_CLASSIFIER_CONCURRENCY: ${{ vars.LLM_CLASSIFIER_CONCURRENCY || '2' }}
          LLM_CLASSIFIER_TIMEOUT_MS: ${{ vars.LLM_CLASSIFIER_TIMEOUT_MS || '120000' }}
          PIPELINE_WINDOW_HOURS: ${{ vars.PIPELINE_WINDOW_HOURS || '56' }}
          TWEX_REUSE_RAW: ${{ vars.TWEX_REUSE_RAW || 'false' }}
          TWEX_FETCH_CONCURRENCY: ${{ vars.TWEX_FETCH_CONCURRENCY || '3' }}
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          REPORT_PUBLIC_BASE_URL: ${{ vars.REPORT_PUBLIC_BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run ci:daily
      - name: Save runtime cache
        if: always() && steps.existing_report.outputs.skip != 'true'
        uses: actions/cache/save@v4
        with:
          path: data/cache
          key: runtime-cache-${{ runner.os }}-${{ github.run_id }}
      - name: Commit public report
        if: steps.existing_report.outputs.skip != 'true'
        run: |
          git config user.name  github-actions
          git config user.email github-actions@github.com
          git add public data/processed/ledger.json || true
          git commit -m "daily report $(date -u +%Y-%m-%d)" || true
          git push || true
      - name: Wait for public report
        if: steps.existing_report.outputs.skip != 'true'
        env:
          REPORT_PUBLIC_BASE_URL: ${{ vars.REPORT_PUBLIC_BASE_URL }}
          PUBLIC_REPORT_WAIT_SECONDS: ${{ vars.PUBLIC_REPORT_WAIT_SECONDS || '90' }}
          PUBLIC_REPORT_WAIT_INTERVAL_SECONDS: ${{ vars.PUBLIC_REPORT_WAIT_INTERVAL_SECONDS || '5' }}
        run: npm run report:wait-public
      - name: Push notification
        if: steps.existing_report.outputs.skip != 'true'
        env:
          LARK_WEBHOOK: ${{ secrets.LARK_WEBHOOK }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          REPORT_PUBLIC_BASE_URL: ${{ vars.REPORT_PUBLIC_BASE_URL }}
        run: npm run report:push

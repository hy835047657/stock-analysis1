pipeline:
  window_hours: 24
  layer_overrides:
    L4_macro: 168
    L6_risk: 168
  per_account_limit: 100
  min_view_count: 1000
  cashtag_regex: '\$[A-Z]{2,6}'
  ticker_validation:
    enabled: true
    cache_ttl_hours: 168
    always_valid:
      - SIVE
      - XFAB
      - SOI
      - LKNCY
    always_invalid:
      - NASA
      - CEO
      - CFO
      - USA
      - USD
      - GDP
      - AI
      - IT
      - IPO
      - SEC
      - FBI
      - DOJ
      - FTC
      - EU
      - UK
      - US
      - PT
      - YOY
      - QOQ
      - MOM
      - ATH
      - ATL
      - EPS
      - GAAP
  position_signal_keywords:
    long: ["long", "buy", "adding", "added", "bought", "accumulating", "loaded"]
    short: ["short", "sell", "selling", "trimmed", "trim", "exited", "closed"]
    target: ["target", "PT ", "price target", "2x", "3x", "5x", "10x", "MC of"]
  red_flag_keywords:
    - "fraud"
    - "short report"
    - "accounting"
    - "going concern"
    - "delisting"
    - "FTC"
    - "DOJ"
    - "SEC"

output:
  formats: ["markdown", "lark"]
  report_dir: "data/reports"
  weekly_section:
    enabled: true
    weekday: 2                # 0=Sun ... 6=Sat (Node convention). 2=Tue
    include_layers: ["L4_macro", "L6_risk"]

disclaimer: |
  本报告仅聚合 X 平台公开博主观点，用于信息整理与线索追踪。
  内容不构成任何投资建议，请务必独立核验并自行判断风险。
